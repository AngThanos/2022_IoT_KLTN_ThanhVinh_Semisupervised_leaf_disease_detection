name: research-env

channels:
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python=3.9
  - pip>=21.0

  # Scientific computing
  - numpy>=1.20.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  
  # Machine learning
  - scikit-learn>=1.0.0
  - statsmodels>=0.13.0
  
  # Visualization
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  - plotly>=5.0.0
  
  # Jupyter
  - jupyter>=1.0.0
  - ipykernel>=6.0.0
  - ipywidgets>=7.6.0
  
  # Development tools
  - pytest>=6.0.0
  - pytest-cov>=2.12.0
  - black>=21.5b2
  - flake8>=3.9.0
  - isort>=5.9.0
  - mypy>=0.900
  
  # Documentation
  - sphinx>=4.0.0
  - sphinx-rtd-theme>=0.5.0
  
  # Version control
  - git>=2.30.0
  
  # Additional packages via pip
  - pip:
    # Add pip-only packages here
    - pre-commit>=2.15.0
    - nbconvert>=6.1.0
    - nbformat>=5.1.0
    - jupytext>=1.13.0

# To create the conda environment:
# conda env create -f environment.yml
#
# To update the conda environment:
# conda env update -f environment.yml
#
# To activate the conda environment:
# conda activate research-env